name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decompress and fix
        run: |
          cd Build
          for f in *.gz; do
            out="${f%.gz}"
            gunzip -c "$f" > "$out"
            echo "展開: $f -> $out"
          done
          ls -la
          cd ..
          # index.htmlの参照を.gzなしに変更
          sed -i 's/\.framework\.js\.gz/\.framework\.js/g' index.html
          sed -i 's/\.data\.gz/\.data/g' index.html
          sed -i 's/\.wasm\.gz/\.wasm/g' index.html
          sed -i 's/\.loader\.js\.gz/\.loader\.js/g' index.html
          cat index.html | grep -i "build"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: false
