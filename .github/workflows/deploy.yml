name: Fix and Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/**'

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Decompress gz files
        run: |
          cd Build
          for f in *.gz; do
            [ -f "$f" ] || continue
            out="${f%.gz}"
            gunzip -c "$f" > "$out"
            rm "$f"
            echo "展開: $f -> $out"
          done
          ls -la

      - name: Fix index.html
        run: |
          sed -i 's/\.framework\.js\.gz/\.framework\.js/g' index.html
          sed -i 's/\.data\.gz/\.data/g' index.html
          sed -i 's/\.wasm\.gz/\.wasm/g' index.html
          grep -i "build" index.html

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Decompress build files"
          git push
